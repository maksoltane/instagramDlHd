<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #999;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: monospace;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .checkbox-group:hover {
            background: #f0f1f5;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #667eea;
        }
        
        .checkbox-label {
            flex: 1;
            color: #555;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }
        
        .audio-info {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 600px) {
            .button-group {
                grid-template-columns: 1fr;
            }
        }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        
        .btn-cookies {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-cookies:hover:not(:disabled) {
            background: #d0d0d0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .btn-formats {
            background: #3498db;
            color: white;
        }
        
        .btn-formats:hover:not(:disabled) {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        
        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 2 / 4;
        }
        
        .btn-download:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        @media (max-width: 600px) {
            .btn-download {
                grid-column: 1;
            }
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader-text {
            color: #667eea;
            font-size: 14px;
            font-weight: 500;
        }
        
        .output {
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            min-height: 120px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }
        
        .output.success {
            color: #27ae60;
            background: #f0fdf4;
            border-color: #27ae60;
        }
        
        .output.error {
            color: #e74c3c;
            background: #fdf0f0;
            border-color: #e74c3c;
        }
        
        .output.info {
            color: #3498db;
            background: #f0f7ff;
            border-color: #3498db;
        }
        
        .quality-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            margin: 5px 0;
            font-weight: 600;
        }
        
        .quality-badge.with-audio {
            background: #27ae60;
        }
        
        .quality-badge.without-audio {
            background: #f39c12;
        }
        
        /* Scrollbar custom */
        .output::-webkit-scrollbar {
            width: 6px;
        }
        
        .output::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 4px;
        }
        
        .output::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 4px;
        }
        
        .output::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📥 Instagram Downloader</h1>
            <p class="subtitle">Téléchargez des vidéos et images en meilleure résolution</p>
        </div>
        
        <div class="input-group">
            <label for="url">URL Instagram :</label>
            <input 
                type="text" 
                id="url" 
                placeholder="https://www.instagram.com/p/DJtWvzMsSJQ/" 
                autocomplete="off"
            >
        </div>
        
        <div class="checkbox-group" onclick="toggleAudio()">
            <input 
                type="checkbox" 
                id="withAudio" 
                checked
            >
            <div>
                <label for="withAudio" class="checkbox-label">
                    ✓ Avec le son (Audio + Vidéo fusionné)
                </label>
                <div class="audio-info">
                    📽️ Meilleure qualité | ⚠️ Fichier plus volumineux
                </div>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-cookies" id="btnCookies" onclick="updateCookies()">
                🔄 Tester Cookies
            </button>
            <button class="btn-formats" id="btnFormats" onclick="getFormats()">
                👁️ Voir formats
            </button>
            <button class="btn-download" id="btnDownload" onclick="downloadVideo()">
                ⬇️ Télécharger
            </button>
        </div>
        
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <div class="loader-text">Traitement en cours...</div>
        </div>
        
        <div class="output" id="output">👋 Prêt ! Entrez une URL Instagram (vidéo, reel, story ou image) et cliquez sur "Télécharger"</div>
    </div>
    
    <script>
        const urlInput = document.getElementById('url');
        const withAudioCheckbox = document.getElementById('withAudio');
        const output = document.getElementById('output');
        const loader = document.getElementById('loader');
        const btnDownload = document.getElementById('btnDownload');
        const btnFormats = document.getElementById('btnFormats');
        const btnCookies = document.getElementById('btnCookies');
        
        const API_BASE = '';
        let downloadInProgress = false;
        
        function toggleAudio() {
            withAudioCheckbox.checked = !withAudioCheckbox.checked;
        }
        
        function showOutput(message, type = 'info') {
            output.textContent = message;
            output.className = 'output ' + type;
        }
        
        function showLoader(show) {
            loader.style.display = show ? 'block' : 'none';
        }
        
        function setButtonsDisabled(disabled) {
            btnDownload.disabled = disabled;
            btnFormats.disabled = disabled;
            btnCookies.disabled = disabled;
        }
        
        function validateUrl(url) {
            if (!url.trim()) {
                showOutput('❌ Veuillez entrer une URL Instagram', 'error');
                return false;
            }
            
            if (!url.includes('instagram.com')) {
                showOutput('❌ URL invalide. Utilisez une URL Instagram valide', 'error');
                return false;
            }
            
            return true;
        }
        
        async function updateCookies() {
            showLoader(true);
            setButtonsDisabled(true);
            
            try {
                const response = await fetch(`${API_BASE}/update-cookies`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showOutput(`✅ ${data.message}\n\nVous pouvez télécharger des stories et vidéos privées.`, 'success');
                } else {
                    showOutput(`⚠️ ${data.error}\n\nConnectez-vous à Instagram dans Chrome puis réessayez.`, 'error');
                }
            } catch (error) {
                showOutput(`❌ Erreur de connexion au serveur:\n${error.message}`, 'error');
            } finally {
                showLoader(false);
                setButtonsDisabled(false);
            }
        }
        
        async function getFormats() {
            const url = urlInput.value.trim();
            if (!validateUrl(url)) return;
            
            showLoader(true);
            setButtonsDisabled(true);
            
            try {
                const response = await fetch(`${API_BASE}/formats`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    const formatsText = data.formats
                        .split('\n')
                        .slice(0, 30)  // Limiter à 30 lignes
                        .join('\n');
                    showOutput(`📊 Formats disponibles:\n\n${formatsText}`, 'info');
                } else {
                    showOutput(`❌ Erreur:\n${data.error || 'Impossible de récupérer les formats'}`, 'error');
                }
            } catch (error) {
                showOutput(`❌ Erreur de connexion:\n${error.message}`, 'error');
            } finally {
                showLoader(false);
                setButtonsDisabled(false);
            }
        }
        
        async function downloadVideo() {
            const url = urlInput.value.trim();
            if (!validateUrl(url)) return;
            
            if (downloadInProgress) {
                showOutput('⏳ Un téléchargement est déjà en cours...', 'info');
                return;
            }
            
            downloadInProgress = true;
            showLoader(true);
            setButtonsDisabled(true);
            
            const withAudio = withAudioCheckbox.checked;
            const qualityBadge = withAudio 
                ? '<quality-badge class="quality-badge with-audio">📽️ Avec son</quality-badge>'
                : '<quality-badge class="quality-badge without-audio">🎬 Sans son</quality-badge>';
            
            try {
                showOutput(`🔄 Téléchargement en cours...\n${qualityBadge}\n\nVeuillez patienter...`, 'info');
                
                const response = await fetch(`${API_BASE}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url,
                        withAudio
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    let details = '';
                    if (data.mediaType === 'image') {
                        details = '🖼️ Type: Image haute résolution';
                    } else {
                        const audioText = withAudio ? 'audio + vidéo fusionnés' : 'vidéo seule';
                        details = `🎬 Format: ${audioText}`;
                    }
                    showOutput(
                        `✅ ${data.message}\n\n` +
                        `📂 Fichier sauvegardé dans: ~/Downloads\n` +
                        `${details}\n` +
                        `📥 Vérifiez votre dossier Downloads`,
                        'success'
                    );
                    
                    // Auto-clear après 5 secondes
                    setTimeout(() => {
                        showOutput('👋 Prêt pour un nouveau téléchargement !', 'info');
                    }, 5000);
                } else {
                    const errorMsg = data.error || 'Erreur inconnue';
                    showOutput(
                        `❌ Erreur lors du téléchargement:\n\n${errorMsg}`,
                        'error'
                    );
                }
            } catch (error) {
                showOutput(
                    `❌ Erreur de connexion:\n${error.message}\n\n` +
                    `⚠️ Assurez-vous que le serveur Flask est lancé:\n` +
                    `python app.py`,
                    'error'
                );
            } finally {
                showLoader(false);
                setButtonsDisabled(false);
                downloadInProgress = false;
            }
        }
        
        // Raccourci clavier: Entrée pour télécharger
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                downloadVideo();
            }
        });
        
        // Affichage initial
        showOutput('👋 Prêt ! Entrez une URL Instagram (vidéo, reel, story ou image) et cliquez sur "Télécharger"', 'info');
    </script>
</body>
</html>
